services:
  backend:
    build:
      context: ./backend
    container_name: website-generator-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/storage:/app/storage
    expose:
      - "8000"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: website-generator-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
